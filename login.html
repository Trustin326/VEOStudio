<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Login</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;650;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script></head><body><div id="navMount"></div>
<div class="page shell" style="max-width:620px"><div class="section"><h2>Login / Register</h2><p>Demo mode stores users locally until you add Apps Script URL.</p><form class="form" onsubmit="auth(event)"><input id="name" placeholder="Creator name"><input id="email" type="email" placeholder="Email address" required><select id="role"><option value="customer">Customer / Creator</option><option value="affiliate">Affiliate Partner</option><option value="admin">Admin / Owner</option></select><button class="btn btn-primary">Enter Studio</button></form></div></div><script>async function auth(e){e.preventDefault();const res=await API.call('login',{name:name.value,email:email.value,role:role.value});if(res.ok){Store.setUser(res.user);location.href=role.value==='admin'?'admin.html':'dashboard.html'}}</script>
<footer class="footer page">© VeoStudio AI — cinematic AI video SaaS.</footer><script>mountNav("login")</script></body></html>
