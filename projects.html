<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Projects</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;650;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script></head><body><div id="navMount"></div>
<div class="page shell"><div class="section"><h2>Saved Projects</h2><div id="list" class="grid grid-3"></div></div></div><script>const u=requireUser();async function load(){const r=await API.call('listProjects',{email:u.email});const p=r.projects||[];list.innerHTML=p.length?p.map(x=>`<div class='card'><span class='badge'>${new Date(x.createdAt).toLocaleDateString()}</span><h3>${x.title}</h3><p>${x.data?.style||'Music Video'}</p><button class='btn btn-dark' onclick='exportProjectCard(${JSON.stringify(x)})'>Download</button></div>`).join(''):`<div class='card'>No saved projects yet.</div>`}load()</script>
<footer class="footer page">© VeoStudio AI — cinematic AI video SaaS.</footer><script>mountNav("projects")</script></body></html>
