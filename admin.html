<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;650;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="css/style.css"><script src="js/config.js"></script><script src="js/api.js"></script><script src="js/app.js"></script></head><body><div id="navMount"></div>
<div class="page shell"><div class="nav"><a class="logo" href="index.html"><span class="mark"></span><span>Admin Dashboard</span></a><div class="navlinks"><a href="dashboard.html">Home</a><a href="pricing.html">Stripe</a><a href="#" onclick="Store.logout()">Logout</a></div></div><main class="app-layout"><section><div class="grid grid-4" id="report"></div><div class="card" style="margin-top:18px"><h3>User Management</h3><table class="table" id="table"></table></div><div class="thumb" style="height:180px;margin-top:18px"></div></section><aside><div class="card"><h3>Revenue Stats</h3><canvas id="pie" width="300" height="220"></canvas></div><div class="card" style="margin-top:18px"><h3>Content Moderation</h3><div class="stat-card"><b>28</b> Pending Reviews</div><br><div class="stat-card"><b>7</b> Flagged Videos</div></div></aside></main></div><script>requireUser();async function load(){const r=await API.call('adminReport',{}),x=r.report;report.innerHTML=`<div class='stat-card stat'><span>Total Users</span><b>${x.users}</b></div><div class='stat-card stat'><span>Monthly Revenue</span><b>$${x.revenue}</b></div><div class='stat-card stat'><span>Videos Generated</span><b>${x.projects}</b></div><div class='stat-card stat'><span>Sales</span><b>${x.sales}</b></div>`;table.innerHTML='<tr><th>User</th><th>Plan</th><th>Credits</th></tr>'+x.tables.USERS.map(u=>`<tr><td>${u.email}</td><td><span class='badge'>${u.plan}</span></td><td>${u.credits}</td></tr>`).join('');drawPie()}function drawPie(){const c=document.getElementById('pie'),ctx=c.getContext('2d');ctx.fillStyle='#12072b';ctx.fillRect(0,0,c.width,c.height);['#22d3ee','#a855f7','#ff4fbf','#fff'].forEach((col,i)=>{ctx.beginPath();ctx.moveTo(150,110);ctx.fillStyle=col;ctx.arc(150,110,75,i*1.55,(i+1)*1.55);ctx.fill()})}load()</script>
<footer class="footer page">© VeoStudio AI — cinematic AI video SaaS.</footer><script>mountNav("admin")</script></body></html>
